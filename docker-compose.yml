version: "3.9"

# ============================================================================
# NueOne — Full Stack Docker Compose
# ============================================================================
# Services: PostgreSQL, Redis, FastAPI Backend, Next.js Frontend,
#           Celery Worker, Nginx Reverse Proxy
#
# Usage:
#   docker compose up --build -d        # Start all services
#   docker compose logs -f backend      # View backend logs
#   docker compose exec backend bash    # Shell into backend
#   docker compose down -v              # Stop and remove volumes
# ============================================================================

services:
  # ─── PostgreSQL Database ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: nueone-db
    environment:
      POSTGRES_USER: ${DB_USER:-nuegrowth}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nuegrowth}
      POSTGRES_DB: ${DB_NAME:-nuegrowth}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nuegrowth}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - nueone-network

  # ─── Redis Cache ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nueone-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nueone-network

  # ─── FastAPI Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nueone-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-nuegrowth}:${DB_PASSWORD:-nuegrowth}@db:5432/${DB_NAME:-nuegrowth}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-secure-random-string}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_MINUTES=${JWT_EXPIRATION_MINUTES:-60}
      - BACKEND_CORS_ORIGINS=http://localhost:3000,http://localhost,http://localhost:80
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - nueone-network

  # ─── Celery Worker (Background Tasks) ─────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nueone-worker
    command: celery -A app.worker worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-nuegrowth}:${DB_PASSWORD:-nuegrowth}@db:5432/${DB_NAME:-nuegrowth}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-secure-random-string}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - nueone-network

  # ─── Next.js Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nueone-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api/v1
      - NEXTAUTH_URL=http://localhost
      - NEXTAUTH_SECRET=${JWT_SECRET:-change-me-to-a-secure-random-string}
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    networks:
      - nueone-network

  # ─── Nginx Reverse Proxy ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nueone-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 15s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - nueone-network

# ─── Volumes ──────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

# ─── Network ──────────────────────────────────────────────────────────────
networks:
  nueone-network:
    driver: bridge
